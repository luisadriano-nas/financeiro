<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Planejador Financeiro</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#080c10">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Financeiro">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  --bg:#080c10;--s1:#0f1520;--s2:#162030;--s3:#1e2d40;--s4:#243550;
  --dim:#2a4060;--muted:#5a7a9a;--text:#d8e8f8;
  /* Cores suaves para uso no dia a dia */
  --green:#28c87a;--green-soft:rgba(40,200,122,.12);--green-dim:rgba(40,200,122,.5);
  --gbg:#04200e;--gbr:#0a4020;
  --blue:#38b4f8;--blue-soft:rgba(56,180,248,.1);--bbg:#021830;--bbr:#083060;
  --yellow:#f0c040;--yellow-soft:rgba(240,192,64,.12);--ybg:#201400;--ybr:#402800;
  --red:#f05050;--red-soft:rgba(240,80,80,.12);--rbg:#200808;--rbr:#401010;
  --purple:#a878f8;--pbg:#180c30;--pbr:#301860;
  --nav-h:64px;--radius:14px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --transition: .18s cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
.app{background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative;overflow:hidden}
/* Transição de tela */
.screen{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 32px);animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.topbar{padding:1.1rem 1rem .7rem;border-bottom:1px solid var(--s3);background:var(--bg);position:sticky;top:0;z-index:10}
.topbar-row{display:flex;align-items:center;gap:10px}
.topbar h2{font-size:1.05rem;font-weight:700}
.topbar p{font-size:.7rem;color:var(--muted);margin-top:2px}
.back-btn{background:none;border:none;color:var(--blue);font-size:1.4rem;cursor:pointer;padding:0;line-height:1;min-width:28px}
.card{background:var(--s1);border:1px solid var(--s3);border-radius:var(--radius);margin:.6rem .8rem;overflow:hidden;transition:opacity var(--transition)}
.card:active{opacity:.85}
.card-hdr{padding:9px 14px;border-bottom:1px solid var(--s3);display:flex;align-items:center;gap:8px}
.card-ttl{font-size:.65rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:700}
.card-body{padding:12px 14px}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 .8rem;margin:.8rem 0}
.metric{background:var(--s1);border:1px solid var(--s3);border-radius:10px;padding:11px 13px}
.metric-lbl{font-size:.6rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:4px}
.metric-val{font-size:1.05rem;font-weight:700;font-family:monospace}
.row-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--s3);gap:10px;transition:background var(--transition)}
.row-item:active{background:var(--s2)}
.row-item:last-child{border:none}
.row-item-l{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.row-item-n{font-size:.88rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-item-s{font-size:.67rem;color:var(--muted)}
.row-item-r{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.row-item-v{font-size:.88rem;font-weight:600;font-family:monospace}
.rm-btn{background:none;border:none;color:var(--muted);font-size:.68rem;cursor:pointer;font-family:inherit;padding:2px 0}
/* Lista de meses — mais visual */
.month-row{display:flex;align-items:center;gap:10px;padding:12px .8rem;border-bottom:1px solid var(--s3);cursor:pointer;border-left:3px solid transparent;transition:background var(--transition)}
.month-row:active{background:var(--s2)}
.month-lbl{font-size:.85rem;font-weight:700;min-width:52px}
.month-mid{flex:1}
.bar-track{height:4px;background:var(--s3);border-radius:2px;overflow:hidden;margin-bottom:3px}
.bar-fill{height:100%;border-radius:2px;transition:width .4s ease}
.bar-labels{display:flex;justify-content:space-between;font-size:.58rem;color:var(--muted)}
.month-r{text-align:right;flex-shrink:0}
.month-surp{font-size:.8rem;font-weight:700;font-family:monospace}
.month-bank{font-size:.65rem;font-family:monospace;color:var(--muted)}
.month-trend{font-size:.72rem;margin-left:2px}
.detail-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--s3);font-size:.82rem;gap:8px}
.detail-row:last-child{border:none}
.detail-l{display:flex;align-items:center;gap:8px;color:var(--muted);flex:1;min-width:0}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.detail-v{font-family:monospace;font-weight:600;font-size:.84rem;flex-shrink:0}
.detail-total{display:flex;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid var(--s4)}
.alert{padding:9px 13px;border-radius:10px;font-size:.78rem;line-height:1.65;border:1px solid;margin:.5rem .8rem}
.alert strong{font-weight:600}
.alert-ok{background:var(--green-soft);border-color:var(--gbr);color:var(--green-dim)}
.alert-warn{background:var(--yellow-soft);border-color:var(--ybr);color:#c09828}
.alert-bad{background:var(--red-soft);border-color:var(--rbr);color:#c04848}
.alert-info{background:var(--blue-soft);border-color:var(--bbr);color:#3090c0}
.btn{background:var(--blue);color:#040810;border:none;border-radius:10px;padding:11px 18px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:inherit;display:block;width:100%;transition:all var(--transition)}
.btn:active{opacity:.8;transform:scale(.98)}
.btn:disabled{opacity:.4;cursor:default}
.btn-o{background:transparent;color:var(--blue);border:1px solid var(--bbr)}
.btn-sm{width:auto;padding:7px 13px;font-size:.76rem}
.inp-grp{margin-bottom:11px}
.inp-lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);display:block;margin-bottom:4px;font-weight:600}
.inp{background:var(--s2);border:1px solid var(--s3);border-radius:8px;padding:10px 12px;color:var(--text);font-size:.88rem;font-family:inherit;width:100%;outline:none;transition:border-color var(--transition)}
.inp:focus{border-color:var(--blue)}
select.inp{appearance:none;cursor:pointer}
.inp-row{display:flex;gap:8px}
.inp-row .inp-grp{flex:1}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.chip{padding:4px 9px;border-radius:16px;font-size:.68rem;font-weight:600;cursor:pointer;border:1px solid var(--s3);background:var(--s1);color:var(--muted);transition:all .12s;user-select:none}
.chip.on{background:var(--bbg);border-color:var(--bbr);color:var(--blue)}
.chip.skip-on{background:var(--ybg);border-color:var(--ybr);color:var(--yellow)}
.chip.pay-on{background:var(--gbg);border-color:var(--gbr);color:var(--green)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:flex-end;animation:fadeIn .15s ease}
.modal{background:var(--s1);border-radius:18px 18px 0 0;padding:1.3rem 1rem 1.6rem;width:100%;max-height:90vh;overflow-y:auto;border-top:1px solid var(--s3)}
.modal-ttl{font-size:1rem;font-weight:700;margin-bottom:1rem}
/* Nav com indicador ativo melhorado */
.nav{position:absolute;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:var(--s1);border-top:1px solid var(--s3);display:flex;z-index:50}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--dim);font-size:.55rem;font-weight:700;cursor:pointer;transition:color var(--transition);font-family:inherit;text-transform:uppercase;letter-spacing:.04em;position:relative}
.nav-btn.on{color:var(--blue)}
.nav-btn.on::after{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--blue);border-radius:0 0 2px 2px}
.nav-icon{font-size:1.3rem;line-height:1}
/* Chat melhorado */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - var(--nav-h) - var(--safe-bottom))}
.chat-msgs{flex:1;overflow-y:auto;padding:1rem .8rem;display:flex;flex-direction:column;gap:12px}
.bubble{max-width:85%;padding:10px 14px;border-radius:16px;font-size:.83rem;line-height:1.75;white-space:pre-wrap;word-break:break-word;animation:bubbleIn .2s ease}
@keyframes bubbleIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.bubble-ai{background:var(--s2);border:1px solid var(--s3);align-self:flex-start;border-radius:4px 16px 16px 16px;color:var(--text)}
.bubble-user{background:var(--blue);color:#030810;align-self:flex-end;border-radius:16px 16px 4px 16px;font-weight:500}
.chat-footer{padding:8px .8rem .6rem;border-top:1px solid var(--s3);display:flex;gap:8px;align-items:center}
.chat-inp{flex:1;background:var(--s2);border:1px solid var(--s3);border-radius:22px;padding:10px 16px;color:var(--text);font-size:.85rem;font-family:inherit;outline:none;transition:border-color var(--transition)}
.chat-inp:focus{border-color:var(--blue)}
/* Sugestões rápidas do chat */
.chat-suggestions{display:flex;gap:6px;padding:.5rem .8rem;overflow-x:auto;-webkit-overflow-scrolling:touch}
.chat-suggestions::-webkit-scrollbar{display:none}
.chat-sug{background:var(--s2);border:1px solid var(--s3);border-radius:16px;padding:5px 11px;font-size:.72rem;color:var(--blue);white-space:nowrap;cursor:pointer;flex-shrink:0;transition:all var(--transition)}
.chat-sug:active{background:var(--bbg);border-color:var(--bbr)}
.send-btn{background:var(--blue);border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:1rem;transition:all var(--transition)}
.send-btn:active{transform:scale(.92)}
.send-btn:disabled{opacity:.4;cursor:default}
.bank-bar-track{height:5px;background:var(--dim);border-radius:3px;overflow:hidden;margin:.4rem .8rem .8rem}
.bank-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue),var(--green));transition:width .5s}
.section-lbl{padding:.8rem .8rem .3rem;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--dim)}
.empty-icon{font-size:2rem;margin-bottom:.5rem}
.empty p{font-size:.83rem;margin-bottom:1rem;color:var(--muted)}
.add-row{padding:8px 12px}
.dots span{animation:blink 1.2s infinite;display:inline-block}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.seg{display:flex;background:var(--s2);border-radius:8px;padding:3px;gap:3px;margin-bottom:11px}
.seg-btn{flex:1;padding:7px;border:none;border-radius:6px;font-size:.75rem;font-weight:600;cursor:pointer;background:transparent;color:var(--muted);font-family:inherit;transition:all .15s}
.seg-btn.on{background:var(--blue);color:#040810}
.hint{font-size:.68rem;color:var(--muted);margin-top:4px;line-height:1.5}
.check-btn{background:none;border:none;font-size:1.1rem;cursor:pointer;padding:0 0 0 8px;flex-shrink:0;line-height:1;transition:transform var(--transition)}
.check-btn:active{transform:scale(1.3)}
/* ── Gráfico de categorias ── */
.cat-pie{display:flex;flex-direction:column;gap:6px;padding:4px 0}
.cat-row{display:flex;align-items:center;gap:8px;font-size:.75rem}
.cat-bar-wrap{flex:1;height:6px;background:var(--s3);border-radius:3px;overflow:hidden}
.cat-bar{height:100%;border-radius:3px;transition:width .4s}
.cat-lbl{min-width:80px;color:var(--muted)}
.cat-val{min-width:60px;text-align:right;font-family:monospace;font-weight:600;font-size:.73rem}
/* ── Meta ── */
.goal-ring-wrap{display:flex;flex-direction:column;align-items:center;padding:.8rem 0 .4rem}
.goal-ring{position:relative;width:90px;height:90px}
.goal-ring svg{transform:rotate(-90deg)}
.goal-ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700}
/* ── Fechamento mensal ── */
.close-card{background:linear-gradient(135deg,var(--pbg),var(--s1));border:1px solid var(--pbr);border-radius:var(--radius);margin:.6rem .8rem;padding:1rem}
.close-card h3{font-size:.88rem;font-weight:700;margin-bottom:.3rem;color:var(--purple)}
.close-card p{font-size:.72rem;color:var(--muted);margin-bottom:.8rem}
.close-field{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:.8rem}
.close-field label{flex:1;color:var(--muted)}
.close-field input{width:100px;background:var(--s2);border:1px solid var(--s3);border-radius:6px;padding:5px 8px;color:var(--text);font-size:.82rem;font-family:monospace;text-align:right}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="screen" id="mainScreen"></div>
  <nav class="nav" id="mainNav"></nav>
  <div id="modalWrap"></div>
</div>
<script>
const MN=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const now=new Date(), SM=now.getMonth(), SY=now.getFullYear(), SD=now.getDate();
const CATS=['Moradia','Alimentação','Transporte','Saúde','Lazer','Educação','Outros'];
const CAT_COLORS=['#38b4f8','#28c87a','#f0c040','#a878f8','#f08050','#f05090','#5a7a9a'];

const GEMINI_KEY = localStorage.getItem('gemini_key') || '';

// ── State ─────────────────────────────────────────────────────────────────────
let S = loadState();

function defaultState(){
  return {
    tab:'dash', bank:0, incomes:[], bills:[], sim:[], selMonth:null,
    messages:[{role:'ai',text:'👋 Olá! Sou seu assistente financeiro.\n\nVá em ⚙️ Config e cadastre:\n• Suas fontes de renda\n• Seus gastos e dívidas\n• Quanto tem no banco\n\nDepois me pergunte qualquer coisa! 💪'}],
    aiLoading:false,
    goal:null,          // {name, target, months, createdBank}
    history:[],         // [{key, label, realIncome, ...}]
    paid:{},            // {'billId_simMonth': true, 'incId_simMonth': true}
    tipsCache:{},       // {'tips_simMonth_year': 'texto das dicas'}
  };
}

function loadState(){
  try {
    const saved = localStorage.getItem('finapp_v4');
    if(saved){
      const d = JSON.parse(saved);
      const def = defaultState();
      return {...def, bank:d.bank||0, incomes:d.incomes||[], bills:d.bills||[], messages:d.messages||def.messages, goal:d.goal||null, history:d.history||[], paid:d.paid||{}, tipsCache:d.tipsCache||{}};
    }
    // migra v3 se existir
    const old = localStorage.getItem('finapp_v3');
    if(old){
      const d = JSON.parse(old);
      const def = defaultState();
      return {...def, bank:d.bank||0, incomes:d.incomes||[], bills:d.bills||[], messages:d.messages||def.messages};
    }
  } catch(e){}
  return defaultState();
}

function saveState(){
  try {
    localStorage.setItem('finapp_v4', JSON.stringify({
      bank:S.bank, incomes:S.incomes, bills:S.bills,
      messages:S.messages.slice(-30), goal:S.goal, history:S.history, paid:S.paid, tipsCache:S.tipsCache
    }));
  } catch(e){}
}

// ── Simulation ────────────────────────────────────────────────────────────────
function monthLabel(m){ const i=(SM+m-1)%12, y=SY+Math.floor((SM+m-1)/12); return MN[i]+'/'+String(y).slice(2); }
function calMonth(m){ return ((SM+m-1)%12)+1; }

function incActive(inc, m){
  const cm = calMonth(m);
  const f = inc.freq;
  if(f==='once') return m===1; // só no mês atual da simulação
  if(f==='monthly') return true;
  if(f==='odd') return cm%2===1;
  if(f==='even') return cm%2===0;
  if(f==='annual') return inc.months&&inc.months.includes(cm);
  return true;
}

function billActive(bill, m){
  const cm = calMonth(m);
  if(bill.type==='installment'){
    const start = bill.startMonth || 0;
    const elapsed = m - start;
    if(elapsed < 1) return false;
    if(elapsed > bill.remaining) return false;
  }
  if(bill.monthMode==='skip') return !(bill.months||[]).includes(cm);
  if(bill.monthMode==='only') return (bill.months||[]).includes(cm);
  return true;
}

function runSim(){
  let bank = S.bank;
  S.sim = [];
  for(let m=1;m<=24;m++){
    const ai = S.incomes.filter(function(i){ return incActive(i,m); });
    const ab = S.bills.filter(function(b){ return billActive(b,m); });
    const ti = ai.reduce(function(s,i){ return s+i.amount; },0);
    const tb = ab.reduce(function(s,b){ return s+b.amount; },0);
    const surplus = ti - tb;
    bank += surplus;
    S.sim.push({m, label:monthLabel(m), calM:calMonth(m), calY:SY+Math.floor((SM+m-1)/12), ai, ab, ti, tb, surplus, bank});
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt(v, short){ const s=Math.abs(v).toFixed(short?0:2); return (v<0?'-':'')+'R$'+s; }
function freqLbl(f){ return f==='monthly'?'Mensal':f==='odd'?'Meses ímpares':f==='even'?'Meses pares':f==='annual'?'Anual':''; }
function bankColor(v){ return v<0?'var(--red)':v<500?'var(--yellow)':'var(--green)'; }
function surpColor(v){ return v<0?'var(--red)':v===0?'var(--muted)':'var(--green)'; }
function div(cls){ const e=document.createElement('div'); if(cls) e.className=cls; return e; }
function h(tag,attr,txt){ const e=document.createElement(tag); if(attr){ Object.keys(attr).forEach(function(k){ if(k==='cls') e.className=attr[k]; else e.setAttribute(k,attr[k]); }); } if(txt!==undefined) e.textContent=txt; return e; }
function btn(cls,txt,fn){ const b=h('button',{cls},txt); b.type='button'; b.addEventListener('click',fn); return b; }
function sel(id, opts, val){ const s=h('select',{cls:'inp',id}); opts.forEach(function(o){ const op=h('option',{value:o[0]},o[1]); if(o[0]===val) op.selected=true; s.appendChild(op); }); return s; }

// ── Cálculo de gasto seguro ───────────────────────────────────────────────────
function calcSpendable(){
  if(!S.sim.length) return 0;
  const future = S.sim.slice(0,3).map(function(m){ return m.bank; });
  const minFuture = Math.min.apply(null, future);
  const buffer = 300;
  return Math.max(0, Math.min(S.bank, minFuture) - buffer);
}

// ── Mês anterior para fechamento ──────────────────────────────────────────────
function prevMonthKey(){
  const pm = SM === 0 ? 11 : SM-1;
  const py = SM === 0 ? SY-1 : SY;
  return pm+'_'+py;
}
function prevMonthLabel(){
  const pm = SM === 0 ? 11 : SM-1;
  const py = SM === 0 ? SY-1 : SY;
  return MN[pm]+'/'+String(py).slice(2);
}
function isPrevMonthClosed(){
  const key = prevMonthKey();
  return S.history.some(function(h){ return h.key===key; });
}

// ── Notificações ──────────────────────────────────────────────────────────────
function requestNotifPermission(){
  if('Notification' in window && Notification.permission==='default'){
    Notification.requestPermission();
  }
}
function scheduleNotifs(){
  if(!('Notification' in window) || Notification.permission!=='granted') return;
  // Verifica contas que vencem hoje ou amanhã
  const tomorrow = SD + 1;
  S.bills.forEach(function(b){
    if(!b.dueDay) return;
    const daysUntil = b.dueDay - SD;
    if(daysUntil === 1){
      new Notification('💸 Vence amanhã: '+b.name, {
        body: fmt(b.amount)+' — dia '+b.dueDay,
        icon: 'icon-192.png'
      });
    } else if(daysUntil === 0){
      new Notification('🚨 Vence HOJE: '+b.name, {
        body: fmt(b.amount)+' — não esqueça!',
        icon: 'icon-192.png'
      });
    }
  });
  S.incomes.forEach(function(i){
    if(!i.receiveDay) return;
    const daysUntil = i.receiveDay - SD;
    if(daysUntil === 1){
      new Notification('💰 Recebe amanhã: '+i.name, {
        body: fmt(i.amount)+' — dia '+i.receiveDay,
        icon: 'icon-192.png'
      });
    }
  });
}

// ── buildCtx ─────────────────────────────────────────────────────────────────
function buildCtx(){
  if(!S.sim.length) return 'Sem dados configurados ainda.';
  const neg   = S.sim.filter(function(m){ return m.bank<0; }).length;
  const minB  = Math.min.apply(null, S.sim.map(function(m){ return m.bank; }));
  const minM  = S.sim.find(function(m){ return m.bank===minB; });
  const endB  = S.sim[23].bank;
  const avgInc= S.sim.reduce(function(s,m){ return s+m.ti; },0)/24;
  const avgExp= S.sim.reduce(function(s,m){ return s+m.tb; },0)/24;
  const rendas   = S.incomes.map(function(i){ return i.name+' R$'+i.amount+' '+freqLbl(i.freq); }).join('; ') || 'nenhuma';
  const despesas = S.bills.map(function(b){ return b.name+' R$'+b.amount+(b.type==='installment'?' ('+b.remaining+'x)':' fixo')+(b.cat?' ['+b.cat+']':''); }).join('; ') || 'nenhuma';
  const criticos = S.sim.filter(function(m){ return m.bank<0; }).map(function(m){ return m.label+' R$'+m.bank.toFixed(0); }).join(', ') || 'nenhum';
  const goalTxt = S.goal ? 'META: '+S.goal.name+' R$'+S.goal.target+' em '+S.goal.months+' meses' : '';
  return [
    'BANCO ATUAL: R$'+S.bank.toFixed(2),
    'RENDA MEDIA/MES: R$'+avgInc.toFixed(0),
    'DESPESA MEDIA/MES: R$'+avgExp.toFixed(0),
    'SALDO EM 24 MESES: R$'+endB.toFixed(0),
    'PIOR SALDO: R$'+minB.toFixed(0)+' em '+(minM?minM.label:'?'),
    'MESES NEGATIVOS: '+neg,
    neg>0?'CRITICOS: '+criticos:'',
    'RENDAS: '+rendas,
    'DESPESAS: '+despesas,
    goalTxt
  ].filter(Boolean).join('\n');
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function renderDash(){
  const scr = document.getElementById('mainScreen');
  scr.innerHTML='';

  const neg = S.sim.filter(function(m){ return m.bank<0; }).length;
  const nextNeg = S.sim.find(function(m){ return m.bank<0; });

  // ── Fechamento do mês anterior (só nos primeiros 5 dias do mês) ───────────
  if(SD <= 5 && !isPrevMonthClosed()){
    const cc=div('close-card');

    const bankInp=h('input',{type:'number',placeholder:'R$ ...'}); bankInp.value=S.bank.toFixed(0);
    bankGrp.appendChild(bankInp); cc.appendChild(bankGrp);
    const closeBtn=btn('btn btn-sm','Fechar mês →',function(){
      const realBank=parseFloat(bankInp.value);
      if(isNaN(realBank)){alert('Digite o saldo atual');return;}
      showCloseImpact(realBank, estBank, prevSim);
    });
    closeBtn.style.marginTop='.4rem'; cc.appendChild(closeBtn); scr.appendChild(cc);
  }

  // ── Banco + saldo livre ───────────────────────────────────────────────────
  const spendable = calcSpendable();
  const spColor = spendable>500?'var(--green)':spendable>0?'var(--yellow)':'var(--red)';
  const bankCard=div('card'); bankCard.style.margin='.5rem .8rem';
  // Indicador de risco
  const riskIcon = neg>0?'🔴':S.bank<1000?'🟡':'🟢';
  const riskTxt  = neg>0?'Risco':S.bank<1000?'Atenção':'Saudável';
  bankCard.innerHTML=
    '<div style="padding:1rem 1rem .8rem">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem">' +
    '<div style="font-size:.62rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)">Saldo no banco</div>' +
    '<div style="font-size:.7rem;color:var(--muted)">'+riskIcon+' '+riskTxt+'</div>' +
    '</div>' +
    '<div style="font-size:2.2rem;font-weight:800;font-family:monospace;color:var(--text);letter-spacing:-.5px;margin-bottom:.5rem">'+fmt(S.bank,true)+'</div>' +
    '<div style="display:flex;justify-content:space-between;align-items:center;padding-top:.6rem;border-top:1px solid var(--s3)">' +
    '<div style="font-size:.7rem;color:var(--muted)">Livre hoje</div>' +
    '<div style="font-size:1rem;font-weight:700;font-family:monospace;color:'+spColor+'">'+fmt(spendable,true)+'</div>' +
    '</div>' +
    (nextNeg?'<div style="margin-top:.5rem;font-size:.7rem;color:#c09828">⚠️ Saldo negativo previsto em <strong>'+nextNeg.label+'</strong></div>':'') +
    (neg===0&&S.bank>0?'<div style="margin-top:.5rem;font-size:.7rem;color:var(--green-dim)">✅ Plano viável pelos próximos 24 meses</div>':'') +
    '</div>';
  bankCard.addEventListener('click',function(){ S.tab='ai'; render(); setTimeout(function(){ const ci=document.querySelector('.chat-inp'); if(ci){ ci.value='Quanto posso gastar hoje com segurança?'; ci.focus(); } },100); });
  scr.appendChild(bankCard);

  // ── Vencimentos deste mês ─────────────────────────────────────────────────
  const thisMonthSim = S.sim[0];
  const dueBills = thisMonthSim ? S.bills.filter(function(b){ return b.dueDay && billActive(b,1); }).sort(function(a,b){ return a.dueDay-b.dueDay; }) : [];
  const recInc   = thisMonthSim ? S.incomes.filter(function(i){ return i.receiveDay && incActive(i,1); }).sort(function(a,b){ return a.receiveDay-b.receiveDay; }) : [];

  if(dueBills.length || recInc.length){
    const sl=div('section-lbl'); sl.textContent='Este mês — '+MN[SM]; scr.appendChild(sl);
    const dueCard=div('card'); dueCard.style.marginTop='0';
    const dueBody=div('card-body');

    // Recebimentos primeiro
    recInc.forEach(function(i){
      const key='inc_'+i.id+'_1';
      const isPaid=!!S.paid[key];

      dr.style.opacity=isPaid?'.45':'1';

      ck.addEventListener('click',function(e){ e.stopPropagation(); S.paid[key]=!S.paid[key]; saveState(); renderDash(); });
      dr.appendChild(ck); dueBody.appendChild(dr);
    });

    // Vencimentos
    dueBills.forEach(function(b){
      const key='bill_'+b.id+'_1';
      const isPaid=!!S.paid[key];
      const isToday=b.dueDay===SD, isTomorrow=b.dueDay===SD+1, isPast=b.dueDay<SD;
      const dayColor=isPaid?'var(--muted)':isToday?'var(--red)':isTomorrow?'var(--yellow)':'var(--muted)';

      dr.style.opacity=isPaid?'.45':'1';

      const ck=h('button',{cls:'check-btn'}); ck.innerHTML=isPaid?'✅':'⬜'; ck.type='button';
      ck.addEventListener('click',function(e){ e.stopPropagation(); S.paid[key]=!S.paid[key]; saveState(); renderDash(); });
      dr.appendChild(ck); dueBody.appendChild(dr);
    });

    dueCard.appendChild(dueBody); scr.appendChild(dueCard);
  }

  // ── Meta (compacta) ───────────────────────────────────────────────────────
  if(S.goal){
    const g=S.goal;
    const saved=S.bank-(g.createdBank||0);
    const pct=Math.min(1,Math.max(0,saved/g.target));
    const needed=g.target/g.months;
    const avgSurplus=S.sim.slice(0,g.months).reduce(function(s,m){ return s+m.surplus; },0)/g.months;
    const onTrack=avgSurplus>=needed;
    const gc=div('card'); gc.style.margin='.5rem .8rem';

  if(S.sim.length >= 6){
    const sim6 = S.sim.slice(0,6);
    const bank6 = sim6[5].bank;
    const gastos6 = sim6.reduce(function(s,m){ return s+m.tb; },0);
    const bank6Color = bank6<0?'var(--red)':bank6<500?'var(--yellow)':'var(--green)';
    const maxVal = Math.max.apply(null, sim6.map(function(m){ return Math.max(m.ti, m.tb, 1); }));

    const s6card = div('card'); s6card.style.margin='.5rem .8rem';

      '<div><div style="font-size:.62rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)">Próximos 6 meses</div></div>'+
      '<div style="display:flex;gap:16px;text-align:right">'+
      '<div><div style="font-size:.6rem;color:var(--muted)">Banco em '+sim6[5].label+'</div><div style="font-size:.88rem;font-weight:700;font-family:monospace;color:'+bank6Color+'">'+fmt(bank6,true)+'</div></div>'+
      '<div><div style="font-size:.6rem;color:var(--muted)">Gastos totais</div><div style="font-size:.88rem;font-weight:700;font-family:monospace;color:var(--red)">'+fmt(gastos6,true)+'</div></div>'+
      '</div>';
    s6card.appendChild(s6head);

    // Mini gráfico de barras por mês
    const s6chart = div(null);
    s6chart.style.cssText='padding:0 .8rem .75rem;display:flex;gap:6px;align-items:flex-end';

    sim6.forEach(function(m){
      const col = div(null);
      col.style.cssText='flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer';
      col.addEventListener('click',function(e){ e.stopPropagation(); S.selMonth=m.m; S.tab='months'; render(); });

      const barWrap = div(null);
      barWrap.style.cssText='width:100%;display:flex;flex-direction:column;gap:2px;align-items:center';

      // Barra de entrada (verde)

      const incBar = div(null);
      incBar.style.cssText='width:100%;height:'+Math.max(2,incPct)+'px;background:var(--green);border-radius:2px 2px 0 0;opacity:.85';

      // Barra de saída (vermelho)

      const expBar = div(null);
      expBar.style.cssText='width:100%;height:'+Math.max(2,expPct)+'px;background:var(--red);border-radius:2px 2px 0 0;opacity:.85';

      // Saldo do mês (número pequeno)

    s6card.appendChild(s6chart);
    s6card.appendChild(legend);
    s6card.addEventListener('click',function(){ S.tab='months'; S.selMonth=null; render(); });

  }

  const moreRow=div(null); moreRow.style.cssText='padding:.6rem .8rem 1rem;text-align:center';

  moreRow.appendChild(moreBtn); scr.appendChild(moreRow);
}

// ── Modal: fechamento do mês ──────────────────────────────────────────────────
function showCloseImpact(realBank, estBank, prevSim){
  const wrap=document.getElementById('modalWrap'); wrap.innerHTML='';
  const overlay=div('overlay');
  const modal=div('modal');
  modal.addEventListener('click',function(e){e.stopPropagation();});
  overlay.addEventListener('click',function(){ wrap.innerHTML=''; });
  modal.innerHTML='<div class="modal-ttl">📊 Fechamento de '+prevMonthLabel()+'</div>';

  const diff = realBank - estBank;
  const sign = diff >= 0 ? '+' : '';
  const color = diff >= 0 ? 'var(--green)' : 'var(--red)';
  const msg = diff > 0
    ? 'Você foi melhor que o previsto! 🎉'
    : diff < 0
    ? 'Gastou mais do que o planejado.'
    : 'Exatamente como planejado! ✅';

  const info=div(null); info.style.cssText='font-size:.83rem;line-height:1.9;margin-bottom:1rem';
  info.innerHTML=
    '<div style="margin-bottom:.6rem;font-size:.9rem;font-weight:600">'+msg+'</div>'+
    '<div style="display:flex;justify-content:space-between;padding:.5rem .8rem;background:var(--s2);border-radius:8px;margin-bottom:.4rem">'+
      '<span style="color:var(--muted)">Saldo esperado</span>'+
      '<span style="font-family:monospace;font-weight:600">'+fmt(estBank,true)+'</span>'+
    '</div>'+
    '<div style="display:flex;justify-content:space-between;padding:.5rem .8rem;background:var(--s2);border-radius:8px;margin-bottom:.4rem">'+
      '<span style="color:var(--muted)">Saldo real</span>'+
      '<span style="font-family:monospace;font-weight:600;color:'+color+'">'+fmt(realBank,true)+'</span>'+
    '</div>'+
    '<div style="display:flex;justify-content:space-between;padding:.5rem .8rem;background:var(--s2);border-radius:8px">'+
      '<span style="color:var(--muted)">Diferença</span>'+
      '<span style="font-family:monospace;font-weight:700;color:'+color+'">'+sign+fmt(diff,true)+'</span>'+
    '</div>';
  modal.appendChild(info);

  const btnRow=div(null); btnRow.style.cssText='display:flex;gap:8px;margin-top:.8rem';
  const skipBtn=btn('btn btn-o','Só registrar',function(){
    S.history.push({key:prevMonthKey(),label:prevMonthLabel(),realBank,estBank,diff,closed:true});
    saveState(); wrap.innerHTML=''; render();
  });
  const applyBtn=btn('btn','Atualizar banco ✓',function(){
    S.bank = realBank;
    S.history.push({key:prevMonthKey(),label:prevMonthLabel(),realBank,estBank,diff,closed:true});
    saveState(); wrap.innerHTML=''; render();
  });
  btnRow.appendChild(skipBtn); btnRow.appendChild(applyBtn); modal.appendChild(btnRow);
  overlay.appendChild(modal); wrap.appendChild(overlay);
}

// ── Modal: meta ───────────────────────────────────────────────────────────────
function showGoalModal(){
  const wrap=document.getElementById('modalWrap'); wrap.innerHTML='';
  const overlay=div('overlay');
  const modal=div('modal');
  modal.addEventListener('click',function(e){e.stopPropagation();});
  overlay.addEventListener('click',function(){ wrap.innerHTML=''; });
  modal.innerHTML='<div class="modal-ttl">🎯 Meta de Economia</div>';
  const nameGrp=div('inp-grp'); nameGrp.innerHTML='<label class="inp-lbl">Nome da meta</label>';
  const nameInp=h('input',{cls:'inp',type:'text',placeholder:'Ex: Viagem, Reserva de emergência...'}); nameInp.value=S.goal?S.goal.name:''; nameGrp.appendChild(nameInp); modal.appendChild(nameGrp);
  const r1=div('inp-row');
  const tgtGrp=div('inp-grp'); tgtGrp.innerHTML='<label class="inp-lbl">Valor total (R$)</label>';
  const tgtInp=h('input',{cls:'inp',type:'number',placeholder:'10000'}); tgtInp.value=S.goal?S.goal.target:''; tgtGrp.appendChild(tgtInp); r1.appendChild(tgtGrp);
  const moGrp=div('inp-grp'); moGrp.innerHTML='<label class="inp-lbl">Em quantos meses?</label>';
  const moInp=h('input',{cls:'inp',type:'number',placeholder:'12'}); moInp.value=S.goal?S.goal.months:''; moGrp.appendChild(moInp); r1.appendChild(moGrp);
  modal.appendChild(r1);
  const hint=div('hint'); hint.style.marginBottom='.8rem';
  function updateHint(){ const t=parseFloat(tgtInp.value)||0; const m=parseInt(moInp.value)||1; hint.textContent=t&&m?'Precisa guardar '+fmt(t/m,true)+' por mês':''; }
  tgtInp.addEventListener('input',updateHint); moInp.addEventListener('input',updateHint); updateHint();
  modal.appendChild(hint);
  const btnRow=div(null); btnRow.style.cssText='display:flex;gap:8px;margin-top:.5rem';
  if(S.goal){ const rmBtn=btn('btn btn-o','Remover meta',function(){ S.goal=null; saveState(); wrap.innerHTML=''; render(); }); btnRow.appendChild(rmBtn); }
  const cancelBtn=btn('btn btn-o','Cancelar',function(){ wrap.innerHTML=''; }); btnRow.appendChild(cancelBtn);
  const saveBtn=btn('btn','Salvar ✓',function(){
    const n=nameInp.value.trim(); const t=parseFloat(tgtInp.value); const m=parseInt(moInp.value);
    if(!n||!t||!m){ alert('Preencha todos os campos!'); return; }
    S.goal={name:n,target:t,months:m,createdBank:S.goal?S.goal.createdBank:S.bank};
    saveState(); wrap.innerHTML=''; render();
  }); btnRow.appendChild(saveBtn);
  modal.appendChild(btnRow); overlay.appendChild(modal); wrap.appendChild(overlay);
}

// ── Months list ───────────────────────────────────────────────────────────────
function renderMonthsList(){
  const scr = document.getElementById('mainScreen');
  scr.innerHTML='';
  const tb=div('topbar'); tb.innerHTML='<h2>📅 Todos os Meses</h2><p>Toque para ver o detalhamento completo</p>'; scr.appendChild(tb);
  if(!S.sim.length){ const e=div('empty'); e.innerHTML='<div class="empty-icon">📅</div><p>Configure seus dados primeiro</p>'; scr.appendChild(e); return; }
  const maxVal = Math.max.apply(null, S.sim.map(function(m){ return Math.max(m.ti,m.tb,1); }));
  S.sim.forEach(function(m, idx){
    const color=m.bank<0?'var(--red)':m.surplus>=0?'var(--green)':'var(--yellow)';
    const trend = idx===0 ? '' : m.bank > S.sim[idx-1].bank ? '↑' : m.bank < S.sim[idx-1].bank ? '↓' : '→';
    const trendColor = trend==='↑'?'var(--green)':trend==='↓'?'var(--red)':'var(--muted)';
    const incW = Math.min(100,(m.ti/maxVal)*100);
    const expW = Math.min(100,(m.tb/maxVal)*100);
    const row=div('month-row');
    row.style.borderLeftColor=color;
    row.innerHTML=
      '<div class="month-lbl">'+m.label+'</div>'+
      '<div class="month-mid">'+
        '<div class="bar-track"><div class="bar-fill" style="width:'+incW+'%;background:var(--green);opacity:.7"></div></div>'+
        '<div class="bar-track"><div class="bar-fill" style="width:'+expW+'%;background:var(--red);opacity:.7"></div></div>'+
        '<div class="bar-labels"><span>'+fmt(m.ti,true)+'</span><span>'+fmt(m.tb,true)+'</span></div>'+
      '</div>'+
      '<div class="month-r">'+
        '<div class="month-surp" style="color:'+surpColor(m.surplus)+'">'+(m.surplus>=0?'+':'')+fmt(m.surplus,true)+'</div>'+
        '<div class="month-bank" style="color:'+bankColor(m.bank)+'">'+fmt(m.bank,true)+(trend?'<span class="month-trend" style="color:'+trendColor+'">'+trend+'</span>':'')+'</div>'+
      '</div>';
    row.addEventListener('click',function(){ S.selMonth=m.m; render(); scr.scrollTop=0; });
    scr.appendChild(row);
  });
}

  const tb=div('topbar');

  tipsCard.appendChild(tipsHdr); tipsCard.appendChild(tipsBody); scr.appendChild(tipsCard);

// ── AI ────────────────────────────────────────────────────────────────────────
function renderAI(){
  const scr = document.getElementById('mainScreen');
  let msgs = scr.querySelector('.chat-msgs');
  if(msgs){
    _patchChatMsgs(msgs);
    const sb = scr.querySelector('.send-btn'); if(sb) sb.disabled = S.aiLoading;
    setTimeout(function(){ msgs.scrollTop=msgs.scrollHeight; },30);
    return;
  }
  scr.innerHTML='';
  const wrap=div('chat-wrap');
  const tb=div('topbar'); tb.innerHTML='<h2>🤖 Assistente IA</h2><p>Gemini · Conselheiro financeiro pessoal</p>'; wrap.appendChild(tb);

  // Sugestões rápidas
  const sugs=div('chat-suggestions');
  ['Posso gastar hoje?','Como economizar?','Estou bem financeiramente?','Quando fico negativo?','Dicas para este mês'].forEach(function(q){
    const s=div('chat-sug'); s.textContent=q;
    s.addEventListener('click',function(){
      if(S.aiLoading) return;
      S.messages.push({role:'user',text:q});
      _patchChatMsgs(msgs); msgs.scrollTop=msgs.scrollHeight;
      sendChat(q);
    });
    sugs.appendChild(s);
  });
  wrap.appendChild(sugs);

  msgs=div('chat-msgs'); _patchChatMsgs(msgs); wrap.appendChild(msgs);
  const footer=div('chat-footer');
  const ci=h('input',{cls:'chat-inp',placeholder:'Pergunte sobre suas finanças...',type:'text'});
  ci.addEventListener('keydown',function(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); const t=ci.value.trim(); if(t&&!S.aiLoading){ ci.value=''; S.messages.push({role:'user',text:t}); _patchChatMsgs(msgs); msgs.scrollTop=msgs.scrollHeight; sendChat(t); } } });
  const sb=h('button',{cls:'send-btn'},'➤'); sb.disabled=S.aiLoading;
  sb.addEventListener('click',function(){ const t=ci.value.trim(); if(t&&!S.aiLoading){ ci.value=''; S.messages.push({role:'user',text:t}); _patchChatMsgs(msgs); msgs.scrollTop=msgs.scrollHeight; sendChat(t); } });
  footer.appendChild(ci); footer.appendChild(sb); wrap.appendChild(footer);
  scr.appendChild(wrap);
  setTimeout(function(){ msgs.scrollTop=msgs.scrollHeight; ci.focus(); },50);
}

function _patchChatMsgs(msgs){
  while(msgs.querySelectorAll('.bubble').length > S.messages.length+(S.aiLoading?1:0)){
    const last=msgs.querySelector('.bubble:last-child'); if(last) msgs.removeChild(last);
  }
  S.messages.forEach(function(m,i){
    let b=msgs.querySelectorAll('.bubble')[i];
    if(!b){ b=div('bubble bubble-'+(m.role==='user'?'user':'ai')); b.textContent=m.text; msgs.appendChild(b); }
  });
  const hasLoading=!!msgs.querySelector('.bubble-loading');
  if(S.aiLoading&&!hasLoading){ const lb=div('bubble bubble-ai bubble-loading'); lb.innerHTML='<span class="dots"><span>•</span><span>•</span><span>•</span></span>'; msgs.appendChild(lb); }
  else if(!S.aiLoading&&hasLoading){ msgs.querySelector('.bubble-loading').remove(); }
}

async function sendChat(txt){
  S.tab='ai'; S.aiLoading=true;
  const scrEl=document.getElementById('mainScreen');
  if(!scrEl.querySelector('.chat-msgs')) renderAI();
  function getMsgs(){ return document.querySelector('.chat-msgs'); }
  const m0=getMsgs(); if(m0){ _patchChatMsgs(m0); m0.scrollTop=m0.scrollHeight; }
  const sb0=document.querySelector('.send-btn'); if(sb0) sb0.disabled=true;
  renderNav();
  try{
    const key=localStorage.getItem('gemini_key')||GEMINI_KEY;
    if(!key){ S.messages.push({role:'ai',text:'⚙️ Configure sua Gemini API Key nas configurações para usar o assistente.'}); S.aiLoading=false; saveState(); const mx=getMsgs(); if(mx){_patchChatMsgs(mx);mx.scrollTop=mx.scrollHeight;} const sbx=document.querySelector('.send-btn'); if(sbx) sbx.disabled=false; return; }
    const contents=S.messages.filter(function(m){ return m.role==='user'||m.role==='ai'; }).map(function(m){ return {role:m.role==='user'?'user':'model',parts:[{text:m.text}]}; });
    const cleanContents=[];
    contents.forEach(function(c){ if(cleanContents.length===0&&c.role==='model') return; if(cleanContents.length>0&&cleanContents[cleanContents.length-1].role===c.role) return; cleanContents.push(c); });
    if(!cleanContents.length||cleanContents[cleanContents.length-1].role!=='user') return;
    const systemPrompt='Assistente financeiro pessoal brasileiro. Direto, empático, prático. Responda em até 8 linhas. Use R$ para valores. Não repita dados já sabidos.\n\n'+buildCtx();
    const res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+key,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system_instruction:{parts:[{text:systemPrompt}]},contents:cleanContents,generationConfig:{maxOutputTokens:800,temperature:0.7}})
    });
    const data=await res.json();
    if(data.error){ S.messages.push({role:'ai',text:'⚠️ Erro da API: '+data.error.message}); }
    else { const reply=(data.candidates&&data.candidates[0]&&data.candidates[0].content&&data.candidates[0].content.parts&&data.candidates[0].content.parts[0]&&data.candidates[0].content.parts[0].text)||'Sem resposta da IA.'; S.messages.push({role:'ai',text:reply}); }
  } catch(e){ S.messages.push({role:'ai',text:'⚠️ Erro: '+(e.message||'Verifique sua conexão.')}); }
  S.aiLoading=false; saveState();
  const mf=getMsgs(); if(mf){ _patchChatMsgs(mf); mf.scrollTop=mf.scrollHeight; }
  const sbf=document.querySelector('.send-btn'); if(sbf) sbf.disabled=false;
}

  const impBtn=btn('btn btn-o btn-sm','📥 Importar JSON',function(){
    const inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
    inp.addEventListener('change',function(){
      const file=inp.files[0]; if(!file) return;
      const reader=new FileReader();
      reader.onload=function(e){
        try{
          const d=JSON.parse(e.target.result);
          if(!d.incomes && !d.bills) throw new Error('Arquivo inválido');
          if(!confirm('Substituir todos os dados atuais pelo backup?')) return;
          S.bank=d.bank||0;
          S.incomes=d.incomes||[];
          S.bills=d.bills||[];
          S.goal=d.goal||null;
          S.history=d.history||[];
          S.paid=d.paid||{};
          S.tipsCache={};
          saveState(); render();
          alert('✅ Dados importados com sucesso!');
        } catch(err){
          alert('❌ Arquivo inválido. Use um backup gerado por este app.');
        }
      };
      reader.readAsText(file);
    });
    inp.click();
  });

  bakRow.appendChild(expBtn); bakRow.appendChild(impBtn);
  bakInner.appendChild(bakRow); bakCard.appendChild(bakInner); scr.appendChild(bakCard);

  const clearWrap=div(null); clearWrap.style.padding='.8rem .8rem 0';
  const clearBtn=btn('btn btn-o btn-sm','🗑 Limpar todos os dados',function(){ if(confirm('Tem certeza? Apaga tudo que foi configurado.')){ S=defaultState(); localStorage.removeItem('finapp_v4'); render(); } });
  clearWrap.appendChild(clearBtn); scr.appendChild(clearWrap);
  const sp=div(null); sp.style.height='.5rem'; scr.appendChild(sp);
}

// ── Income Modal ──────────────────────────────────────────────────────────────
function showIncomeModal(){
  const wrap=document.getElementById('modalWrap'); wrap.innerHTML='';
  let mState={freq:'monthly',months:[]};
  const overlay=div('overlay'); const modal=div('modal');
  modal.addEventListener('click',function(e){e.stopPropagation();}); overlay.addEventListener('click',function(){ wrap.innerHTML=''; });
  modal.innerHTML='<div class="modal-ttl">➕ Nova Fonte de Renda</div>';
  const nameGrp=div('inp-grp'); nameGrp.innerHTML='<label class="inp-lbl">Nome da renda</label>';
  const nameInp=h('input',{cls:'inp',type:'text',placeholder:'Ex: Salário, Bônus, Freelance...'}); nameGrp.appendChild(nameInp); modal.appendChild(nameGrp);
  const r1=div('inp-row');
  const amtGrp=div('inp-grp'); amtGrp.innerHTML='<label class="inp-lbl">Valor (R$)</label>';
  const amtInp=h('input',{cls:'inp',type:'number',placeholder:'0,00'}); amtGrp.appendChild(amtInp); r1.appendChild(amtGrp);
  // Dia de recebimento
  const dayGrp=div('inp-grp'); dayGrp.innerHTML='<label class="inp-lbl">Dia do recebimento</label>';
  const dayInp=h('input',{cls:'inp',type:'number',placeholder:'Ex: 5'}); dayInp.min='1'; dayInp.max='31'; dayGrp.appendChild(dayInp); r1.appendChild(dayGrp);
  modal.appendChild(r1);
  const freqGrp=div('inp-grp'); freqGrp.innerHTML='<label class="inp-lbl">Frequência</label>';
  const freqSel=sel('incFreq',[['monthly','Todo mês'],['once','Único (só este mês)'],['odd','Meses ímpares'],['even','Meses pares'],['annual','Meses específicos']],'monthly');
  freqGrp.appendChild(freqSel); modal.appendChild(freqGrp);
  const monthsSection=div(null); modal.appendChild(monthsSection);
  function updateMonthsSec(){
    monthsSection.innerHTML='';
    if(freqSel.value!=='annual') return;
    const mg=div('inp-grp'); mg.innerHTML='<label class="inp-lbl">Em quais meses recebe?</label>';
    const chips=div('chips');
    MN.forEach(function(mn,i){ const m=i+1; const isOn=mState.months.includes(m); const c=div('chip'+(isOn?' pay-on':'')); c.textContent=mn; c.addEventListener('click',function(){ if(mState.months.includes(m)) mState.months=mState.months.filter(function(x){return x!==m;}); else mState.months.push(m); updateMonthsSec(); }); chips.appendChild(c); });
    mg.appendChild(chips); monthsSection.appendChild(mg);
  }
  freqSel.addEventListener('change',updateMonthsSec); updateMonthsSec();
  const btnRow=div(null); btnRow.style.cssText='display:flex;gap:8px;margin-top:1rem';
  const cancelB=btn('btn btn-o','Cancelar',function(){ wrap.innerHTML=''; });
  const saveB=btn('btn','Adicionar ✓',function(){
    const n=nameInp.value.trim(); const a=parseFloat(amtInp.value); const d=parseInt(dayInp.value)||null;
    if(!n||!a){alert('Preencha o nome e o valor!');return;}
    S.incomes.push({id:String(Date.now()),name:n,amount:a,freq:freqSel.value,months:mState.months.slice(),receiveDay:d});
    saveState(); wrap.innerHTML=''; runSim(); renderCfg();
    if(d) scheduleNotifs();
  });
  btnRow.appendChild(cancelB); btnRow.appendChild(saveB); modal.appendChild(btnRow);
  overlay.appendChild(modal); wrap.appendChild(overlay);
}

// ── Bill Modal ────────────────────────────────────────────────────────────────
function showBillModal(){
  const wrap=document.getElementById('modalWrap'); wrap.innerHTML='';
  let mState={type:'fixed',monthMode:'none',months:[]};
  const overlay=div('overlay'); const modal=div('modal');
  modal.addEventListener('click',function(e){e.stopPropagation();}); overlay.addEventListener('click',function(){ wrap.innerHTML=''; });
  modal.innerHTML='<div class="modal-ttl">➕ Nova Despesa / Dívida</div>';
  const nameGrp=div('inp-grp'); nameGrp.innerHTML='<label class="inp-lbl">Nome</label>';
  const nameInp=h('input',{cls:'inp',type:'text',placeholder:'Ex: Aluguel, Empréstimo, Parcelado...'}); nameGrp.appendChild(nameInp); modal.appendChild(nameGrp);
  const r1=div('inp-row');
  const amtGrp=div('inp-grp'); amtGrp.innerHTML='<label class="inp-lbl">Valor/mês (R$)</label>';
  const amtInp=h('input',{cls:'inp',type:'number',placeholder:'0,00'}); amtGrp.appendChild(amtInp); r1.appendChild(amtGrp);
  // Dia de vencimento
  const dayGrp=div('inp-grp'); dayGrp.innerHTML='<label class="inp-lbl">Dia do vencimento</label>';
  const dayInp=h('input',{cls:'inp',type:'number',placeholder:'Ex: 10'}); dayInp.min='1'; dayInp.max='31'; dayGrp.appendChild(dayInp); r1.appendChild(dayGrp);
  modal.appendChild(r1);
  // Categoria
  const catGrp=div('inp-grp'); catGrp.innerHTML='<label class="inp-lbl">Categoria</label>';
  const catOpts=CATS.map(function(c){ return [c,c]; });
  const catSel=sel('billCat',catOpts,'Outros'); catGrp.appendChild(catSel); modal.appendChild(catGrp);
  // Tipo
  const typeGrp=div('inp-grp'); typeGrp.innerHTML='<label class="inp-lbl">Tipo</label>';
  const typeSeg=div('seg');
  const tFixed=h('button',{cls:'seg-btn on'},'Fixo'); tFixed.type='button';
  const tInst=h('button',{cls:'seg-btn'},'Parcelado'); tInst.type='button';
  const tOnce=h('button',{cls:'seg-btn'},'Único'); tOnce.type='button';
  typeSeg.appendChild(tFixed); typeSeg.appendChild(tInst); typeSeg.appendChild(tOnce); typeGrp.appendChild(typeSeg); modal.appendChild(typeGrp);
  const remSection=div(null); modal.appendChild(remSection);
  function updateRemSection(){ remSection.innerHTML=''; if(mState.type==='installment'){ const rg=div('inp-grp'); rg.innerHTML='<label class="inp-lbl">Quantas parcelas ainda faltam?</label>'; const ri=h('input',{cls:'inp',type:'number',placeholder:'Ex: 12',id:'nbRem'}); ri.min='1'; rg.appendChild(ri); remSection.appendChild(rg); } }
  tFixed.addEventListener('click',function(){ mState.type='fixed'; tFixed.classList.add('on'); tInst.classList.remove('on'); tOnce.classList.remove('on'); updateRemSection(); });
  tInst.addEventListener('click',function(){ mState.type='installment'; tInst.classList.add('on'); tFixed.classList.remove('on'); tOnce.classList.remove('on'); updateRemSection(); });
  tOnce.addEventListener('click',function(){ mState.type='once'; tOnce.classList.add('on'); tFixed.classList.remove('on'); tInst.classList.remove('on'); updateRemSection(); });
  updateRemSection();
  // Início
  const startGrp=div('inp-grp'); startGrp.innerHTML='<label class="inp-lbl">Começa a pagar em qual mês?</label>';
  const startOpts=[['0','Este mês ('+MN[SM]+'/'+String(SY).slice(2)+')']];
  for(let i=1;i<12;i++){ const mi=(SM+i)%12, yi=SY+Math.floor((SM+i)/12); startOpts.push([String(i),MN[mi]+'/'+String(yi).slice(2)]); }
  const startSel=sel('billStart',startOpts,'0'); startGrp.appendChild(startSel); modal.appendChild(startGrp);
  // Exceções
  const modeGrp=div('inp-grp'); modeGrp.innerHTML='<label class="inp-lbl">Tem exceções de meses?</label>';
  const modeSeg=div('seg');
  const mNone=h('button',{cls:'seg-btn on'},'Não'); mNone.type='button';
  const mSkip=h('button',{cls:'seg-btn'},'Pular meses'); mSkip.type='button';
  const mOnly=h('button',{cls:'seg-btn'},'Só nestes meses'); mOnly.type='button';
  modeSeg.appendChild(mNone); modeSeg.appendChild(mSkip); modeSeg.appendChild(mOnly); modeGrp.appendChild(modeSeg); modal.appendChild(modeGrp);
  const monthsSection=div(null); modal.appendChild(monthsSection);
  function setModeBtn(active){ [mNone,mSkip,mOnly].forEach(function(b){b.classList.remove('on');}); active.classList.add('on'); }
  function updateMonthsSection(){ monthsSection.innerHTML=''; if(mState.monthMode==='none') return; const mg=div('inp-grp'); const isSkip=mState.monthMode==='skip'; const ml=h('label',{cls:'inp-lbl'},isSkip?'Não paga em quais meses?':'Paga SOMENTE em quais meses?'); const hint=div('hint'); hint.textContent=isSkip?'Ex: van que não paga no verão':'Ex: parcela que só vence em meses específicos'; const chips=div('chips'); MN.forEach(function(mn,i){ const m=i+1; const isOn=mState.months.includes(m); const c=div('chip'+(isOn?(isSkip?' skip-on':' pay-on'):'')); c.textContent=mn; c.addEventListener('click',function(){ if(mState.months.includes(m)) mState.months=mState.months.filter(function(x){return x!==m;}); else mState.months.push(m); updateMonthsSection(); }); chips.appendChild(c); }); mg.appendChild(ml); mg.appendChild(hint); mg.appendChild(chips); monthsSection.appendChild(mg); }
  mNone.addEventListener('click',function(){ mState.monthMode='none'; mState.months=[]; setModeBtn(mNone); updateMonthsSection(); });
  mSkip.addEventListener('click',function(){ mState.monthMode='skip'; mState.months=[]; setModeBtn(mSkip); updateMonthsSection(); });
  mOnly.addEventListener('click',function(){ mState.monthMode='only'; mState.months=[]; setModeBtn(mOnly); updateMonthsSection(); });
  const btnRow=div(null); btnRow.style.cssText='display:flex;gap:8px;margin-top:1rem';
  const cancelB=btn('btn btn-o','Cancelar',function(){ wrap.innerHTML=''; });
  const saveB=btn('btn','Adicionar ✓',function(){
    const n=nameInp.value.trim(); const a=parseFloat(amtInp.value);
    const r=mState.type==='installment'?parseInt(document.getElementById('nbRem')?.value)||12:mState.type==='once'?1:999;
    const billType=mState.type==='once'?'installment':mState.type; // once = installment with 1x
    const startMonth=parseInt(document.getElementById('billStart')?.value)||0;
    const d=parseInt(dayInp.value)||null; const cat=document.getElementById('billCat')?.value||'Outros';
    if(!n||!a){alert('Preencha o nome e o valor!');return;}
    S.bills.push({id:String(Date.now()),name:n,amount:a,type:billType,remaining:r,startMonth,monthMode:mState.monthMode,months:mState.months.slice(),dueDay:d,cat});
    saveState(); wrap.innerHTML=''; runSim(); renderCfg();
    if(d) scheduleNotifs();
  });
  btnRow.appendChild(cancelB); btnRow.appendChild(saveB); modal.appendChild(btnRow);
  overlay.appendChild(modal); wrap.appendChild(overlay);
}

// ── Main render ───────────────────────────────────────────────────────────────
function render(){
  runSim(); renderNav();
  if(S.tab==='dash') renderDash();
  else if(S.tab==='months') S.selMonth ? renderMonthDetail() : renderMonthsList();
  else if(S.tab==='ai') renderAI();
  else if(S.tab==='cfg') renderCfg();
}

render();
requestNotifPermission();
scheduleNotifs();

// ── Swipe ─────────────────────────────────────────────────────────────────────
(function(){
  const TABS=['dash','months','ai','cfg']; let tx=0, ty=0;
  document.addEventListener('touchstart',function(e){ tx=e.touches[0].clientX; ty=e.touches[0].clientY; },{passive:true});
  document.addEventListener('touchend',function(e){ const dx=e.changedTouches[0].clientX-tx; const dy=e.changedTouches[0].clientY-ty; if(Math.abs(dx)<60||Math.abs(dx)<Math.abs(dy)*1.5) return; if(document.querySelector('.overlay')) return; const idx=TABS.indexOf(S.tab); if(dx<0&&idx<TABS.length-1){ S.tab=TABS[idx+1]; if(S.tab==='months') S.selMonth=null; render(); } if(dx>0&&idx>0){ S.tab=TABS[idx-1]; if(S.tab==='months') S.selMonth=null; render(); } },{passive:true});
})();

// ── PWA ───────────────────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').then(function(reg){
      reg.addEventListener('updatefound',function(){ const nw=reg.installing; nw.addEventListener('statechange',function(){ if(nw.state==='installed'&&navigator.serviceWorker.controller){ nw.postMessage({type:'SKIP_WAITING'}); } }); });
      navigator.serviceWorker.addEventListener('controllerchange',function(){ window.location.reload(); });
      reg.update();
    }).catch(function(){});
  });
}
</script>
